<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Source Chatbot</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #f4f7fa;
            margin: 0;
            padding: 0;
        }
        .container {
            max-width: 800px;
            margin: 20px auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h1 {
            margin: 0;
            font-size: 24px;
        }
        .logout-btn {
            background: rgba(255,255,255,0.2);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: 0.3s;
        }
        .logout-btn:hover {
            background: rgba(255,255,255,0.3);
        }
        #chat-box {
            height: 60vh;
            overflow-y: auto;
            padding: 20px;
            background: #f9fafb;
        }
        .message {
            margin-bottom: 15px;
            display: flex;
        }
        .user-msg {
            justify-content: flex-end;
        }
        .bot-msg {
            justify-content: flex-start;
        }
        .bubble {
            max-width: 75%;
            padding: 12px 16px;
            border-radius: 18px;
            line-height: 1.5;
        }
        .user-bubble {
            background: #667eea;
            color: white;
            border-bottom-right-radius: 4px;
        }
        .bot-bubble {
            background: #e5e7eb;
            color: #333;
            border-bottom-left-radius: 4px;
        }
        .input-area {
            padding: 15px;
            background: white;
            border-top: 1px solid #eee;
            display: flex;
            gap: 10px;
        }
        #query {
            flex: 1;
            padding: 14px 16px;
            border: 2px solid #ddd;
            border-radius: 25px;
            font-size: 16px;
            outline: none;
        }
        #query:focus {
            border-color: #667eea;
        }
        button {
            padding: 14px 24px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
        }
        button:hover {
            background: #5a6fd8;
        }
        .timestamp {
            font-size: 12px;
            color: #888;
            margin-top: 4px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Multi-Source Chatbot</h1>
        <div style="display:flex; gap:10px;">
            <button class="logout-btn" onclick="window.location.href='/api/history/'">History</button>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>
    </div>

    <div id="chat-box"></div>

    <div class="input-area">
        <input type="text" id="query" placeholder="Ask anything..." autocomplete="off" />
        <button onclick="sendQuery()">Send</button>
    </div>
</div>

<script>
async function sendQuery() {
    const input = document.getElementById("query");
    const query = input.value.trim();

    if (!query) return;

    addMessage(query, 'user');
    input.value = "";

    try {
        const response = await fetch("/api/chat/", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "X-CSRFToken": getCookie("csrftoken")
            },
            body: JSON.stringify({ query })
        });

        const data = await response.json();

        if (response.ok) {
            addMessage(data.response || "No response received.", 'bot');
        } else {
            addMessage("Sorry, something went wrong.", 'bot');
        }
    } catch (error) {
        addMessage("Network error. Please try again.", 'bot');
    }
}

function addMessage(text, sender) {
    const chatBox = document.getElementById("chat-box");
    const messageDiv = document.createElement("div");
    messageDiv.className = `message ${sender}-msg`;

    const bubble = document.createElement("div");
    bubble.className = `bubble ${sender}-bubble`;
    bubble.innerHTML = text.replace(/\n/g, '<br>');

    messageDiv.appendChild(bubble);
    chatBox.appendChild(messageDiv);

    chatBox.scrollTop = chatBox.scrollHeight;
}

function getCookie(name) {
    let cookieValue = null;
    if (document.cookie) {
        const cookies = document.cookie.split(';');
        for (let c of cookies) {
            c = c.trim();
            if (c.startsWith(name + '=')) {
                cookieValue = decodeURIComponent(c.substring(name.length + 1));
            }
        }
    }
    return cookieValue;
}

function logout() {
    if (confirm("Are you sure you want to logout?")) {
        const form = document.createElement('form');
        form.method = 'POST';
        form.action = '/logout/';

        const csrfInput = document.createElement('input');
        csrfInput.type = 'hidden';
        csrfInput.name = 'csrfmiddlewaretoken';
        csrfInput.value = getCookie('csrftoken');

        form.appendChild(csrfInput);
        document.body.appendChild(form);
        form.submit();
    }
}

document.getElementById("query").addEventListener("keypress", function(e) {
    if (e.key === "Enter") {
        sendQuery();
    }
});
</script>

</body>
</html>
